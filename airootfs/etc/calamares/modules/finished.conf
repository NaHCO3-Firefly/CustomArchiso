#
# ============================================================================
# 完成页面模块 (finished)
# ============================================================================
# 安装完成或失败后显示的最终页面。
# 可以提供一个"重启系统"按钮。
# ============================================================================
---
# ============================================================================
# 重启行为
# ============================================================================
# 可选值：
#   never           不显示重启按钮
#   user-unchecked  显示按钮，默认不勾选（推荐）
#   user-checked    显示按钮，默认勾选
#   always          显示按钮，强制勾选不可取消
restartNowMode: user-unchecked

# 重启时执行的命令
# 默认: shutdown -r now
# 用 systemctl 可以更优雅地重启
restartNowCommand: "systemctl -i reboot"

# 安装完成后是否发送 DBus 通知
# 需要运行在桌面环境中才能生效（有可访问的 DBus session）
notifyOnFinished: false
