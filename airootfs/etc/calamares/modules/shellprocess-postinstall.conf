#
# ============================================================================
# 安装后命令模块 (shellprocess-postinstall)
# ============================================================================
# 在安装完成后，于目标系统的 chroot 环境中执行额外的配置命令。
# 这些命令所有的包管理器配置完成后执行。
#
# 用法：
#   1. 在 settings.conf 的 instances 中添加：
#        instances:
#          - id:       postinstall
#            module:   shellprocess
#            config:   shellprocess-postinstall.conf
#   2. 在 sequence.exec 的 bootloader 之后添加 shellprocess@postinstall
#
# 这个模块是可选的，大多数配置都已由各模块完成。
# 这里列出的内容是一些边缘情况的补充。
# ============================================================================
---
dontChroot: false   # 在目标系统的 chroot 中执行

timeout: 60         # 单条命令默认超时（秒）

verbose: true       # 将命令输出记录到日志

script:
    # 启用 systemd-resolved（DNS 缓存和解析器）
    # 如果 NetworkManager 已经处理了网络，这项不是必须的
    # - "systemctl enable systemd-resolved.service"

    # 重新生成 locale（确保所有已配置的 locale 都可用）
    # locale-gen 通常在 localecfg 模块中调用，可以确认一遍
    # - "locale-gen"

i18n:
    name: "正在执行安装后配置"
