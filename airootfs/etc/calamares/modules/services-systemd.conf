# ============================================================================
# Systemd 服务管理模块 (services-systemd)
# ============================================================================
# 在目标系统中启用/禁用/屏蔽 systemd 服务单元。
# 每个条目可以指定:
#   name:      服务单元名（如 NetworkManager.service）
#   action:    操作（enable / disable / mask / unmask）
#   mandatory: true=失败则中止安装，false=失败则忽略
#
# 参考: https://wiki.archlinux.org/title/Systemd
# ============================================================================
---
units:
  # ---- 网络 ----
  - name: "NetworkManager.service"
    action: "enable"
    mandatory: true    # 没网络管理器系统很难用，必须启用成功

  # ---- 时间同步 ----
  - name: "systemd-timesyncd.service"
    action: "enable"

  # ---- 包缓存清理 ----
  - name: "paccache.timer"
    action: "enable"  # 定期清理 /var/cache/pacman/pkg 旧包

  # ---- SSH 服务（默认关闭） ----
  - name: "sshd.service"
    action: "disable"

  # ---- 列出其他你可能想启用的服务 ---- #
