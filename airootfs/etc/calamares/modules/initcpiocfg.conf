# ============================================================================
# mkinitcpio 配置模块 (initcpiocfg)
# ============================================================================
# 此模块负责配置目标系统中的 /etc/mkinitcpio.conf。
# mkinitcpio 是 Arch Linux 生成 initramfs 的工具。
# initramfs 是一个小型的根文件系统，在真正的根文件系统挂载前使用，
# 它包含必要的内核模块和工具以挂载真正的根文件系统。
#
# 此模块在 initcpio（实际运行 mkinitcpio）之前执行。
#
# 参考: https://wiki.archlinux.org/title/Mkinitcpio
# ============================================================================
---
# ============================================================================
# 是否使用 systemd 风格的钩子
# ============================================================================
# false = 使用传统的 init 钩子（busybox + 传统脚本）
# true  = 使用 systemd 风格的钩子（更现代，但失去紧急恢复 shell）
#
# 传统钩子更稳定、文档更多
# systemd 钩子能更好地处理现代硬件（NVMe、M.2、dm-verity）
useSystemdHook: false

# ============================================================================
# HOOKS 配置
# ============================================================================
# 修改默认的 mkinitcpio 钩子列表。
# 三种操作：
#   prepend: 在现有钩子列表前插入
#   append:  在现有钩子列表后追加
#   remove:  从现有钩子列表中移除指定的钩子
#
# 默认钩子列表（来自 /etc/mkinitcpio.conf）：
#   base udev autodetect modconf kms keyboard keymap consolefont
#   block filesystems fsck
#
# 常用附加钩子：
#   encrypt:     LUKS 加密根分区需要
#   lvm2:        LVM 逻辑卷需要
#   mdadm_udev:  RAID 需要
#   btrfs:       Btrfs 文件系统（可选，非必需）
#   resume:      休眠恢复需要（hibernate）
#
# 示例：LUKS + LVM 配置
# hooks:
#     prepend: [ keyboard, keymap, consolefont ]
#     append: [ encrypt, lvm2, resume ]
#     remove: []
hooks:
    prepend: []
    append: []
    remove: []

# ============================================================================
# 源文件路径
# ============================================================================
# 从哪个文件读取当前的 mkinitcpio.conf 配置
# 默认 /etc/mkinitcpio.conf，如果是 live 系统的源文件路径
source: "/etc/mkinitcpio.conf"
