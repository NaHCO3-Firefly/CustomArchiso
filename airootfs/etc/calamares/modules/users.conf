#
# ============================================================================
# 用户创建模块 (users)
# ============================================================================
# 让用户输入用户名、密码、主机名。
# 在 exec 阶段会：
#   - 创建用户
#   - 设置密码
#   - 配置 sudo
#   - 设置主机名
#   - 配置自动登录（可选）
#
# 参考: https://wiki.archlinux.org/title/Users_and_groups
# ============================================================================
---
# ============================================================================
# 用户组配置
# ============================================================================
# defaultGroups: 新用户默认加入的组
#
# 每条可以是简单字符串（组名），或带属性的对象：
#   name:       组名
#   must_exist: true=组必须已存在否则报错；false=不存在则自动创建
#   system:     true=作为系统组创建（GID < 1000）
defaultGroups:
    - name: wheel      # wheel 组用户可使用 sudo
      must_exist: false
      system: true
    - name: users
      must_exist: true
      system: true
    - audio
    - video
    - storage
    - optical
    - network

# ============================================================================
# sudo 和 root 配置
# ============================================================================

# 允许使用 sudo 的组（会将 sudo 权限写入 /etc/sudoers.d/10-installer）
# 设为空字符串 "" 则不创建 sudoer 文件
sudoersGroup:    wheel

# 自动登录组（用于自动登录桌面环境的不同发行版所需组名）
# 如果你的发行版不需要单独的 autologin 组，设为空字符串
autologinGroup:  autologin

# sudoers 语法
# false: 生成 ALL=(ALL)    可以以任何用户身份执行命令
# true:  生成 ALL=(ALL:ALL) 可以以任何用户/组身份执行命令
sudoersConfigureWithGroup: false

# 是否设置 root 密码
# false: 隐藏 root 相关选项，禁用 root 账号
#         通过 sudo 提权（类似 Ubuntu 的做法）
setRootPassword: true

# 是否默认勾选"root 使用相同密码"
# 需要 setRootPassword: true
doReusePassword: true

# ============================================================================
# 自动登录设置
# ============================================================================
# 是否向用户显示"自动登录"复选框
displayAutologin:   true

# 自动登录复选框的初始状态
doAutologin:     false   # 默认不自动登录（更安全）

# ============================================================================
# 密码策略
# ============================================================================
# minLength/maxLength: 密码长度限制（-1 表示不限制）
# libpwquality: 使用 libpwquality 库检查密码强度（需要编译时支持）
#
# 宽松策略（允许任意密码）：
#   minLength: -1
#   不设置 libpwquality
#
# 严格策略：
#   minLength: 8
#   maxLength: 64
#   libpwquality:
#       - minlen=8
#       - maxrepeat=3
passwordRequirements:
    minLength: 1       # 至少 1 位（只要非空就行）
    maxLength: -1      # 不限制最大长度

# 是否显示"允许弱密码"复选框
allowWeakPasswords: false

# 弱密码复选框的默认状态
allowWeakPasswordsDefault: false

# ============================================================================
# 用户默认设置
# ============================================================================
user:
  # 用户默认 shell（必须是目标系统中存在的可执行文件）
  # 留空表示使用 useradd 的默认值（/etc/default/useradd）
  shell: /bin/bash

  # 不可用的用户名列表（root 和 nobody 已自动加入）
  forbidden_names: [ root ]

  # 用户家目录权限（三个八进制数字，或 rwx 格式）
  # "o700" = rwx------（只有用户自己能访问）
  # "o750" = rwxr-x---（用户和用户组可以访问）
  home_permissions: "o700"

# ============================================================================
# 主机名设置
# ============================================================================
# location: 主机名写入方式
#   None:     不设置
#   EtcFile:  写入 /etc/hostname（标准方式）
#   Hostnamed: 通过 systemd hostnamed DBus 接口设置
#   Transient: 不写入 /etc/hostname（瞬态主机名）
#
# writeHostsFile: 是否同时写入 /etc/hosts
# template: 主机名建议模板
#   可用变量: ${first} ${name} ${login} ${product} ${cpu} ${host}
hostname:
  location: EtcFile
  writeHostsFile: true
  template: "arch-${product}"
  forbidden_names: [ localhost ]

# ============================================================================
# Active Directory 集成（需要 realmd）
# ============================================================================
allowActiveDirectory: false

# ============================================================================
# 预设值（预先填好的用户名，可选）
# ============================================================================
presets:
    fullName:
        editable: true     # 允许用户修改
    loginName:
        editable: true     # 允许用户修改
