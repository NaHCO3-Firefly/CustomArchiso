#
# ============================================================================
# 卸载模块 (umount)
# ============================================================================
# 安装流程的最后实际步骤。
# 安全地卸载目标系统的所有分区，释放挂载点。
# 清理 chroot 环境，确保所有数据已写入磁盘。
# ============================================================================
---
# ============================================================================
# 紧急模式
# ============================================================================
# 即使前一个模块失败，也运行此模块。
# 这是为了保证即使安装出错，也善尽美地卸载分区，
# 避免下次启动时挂载点冲突。
# ============================================================================
emergency: true
