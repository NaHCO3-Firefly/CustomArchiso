#
# ============================================================================
# 显示管理器模块 (displaymanager)
# ============================================================================
# 配置显示管理器（登录管理器/图形登录界面）。
# 支持：SDDM、LightDM、GDM、LXDM、Greetd。
#
# 此模块会按列表顺序尝试配置第一个安装了的 DM。
# 它还会设置自动登录（如果用户在 users 页面选择了自动登录）。
#
# 参考: https://wiki.archlinux.org/title/Display_manager
# ============================================================================
---
# ============================================================================
# 支持的显示管理器列表（按优先级排序）
# ============================================================================
# 模块会按此顺序检查每个 DM 是否已安装，
# 配置第一个找到的 DM。
displaymanagers:
  - sddm       # KDE Plasma 的默认 DM
  - lightdm    # 轻量级 DM，支持 GTK/Qt
  - gdm        # GNOME 的默认 DM
  - lxdm       # LXDE 的 DM
  - greetd     # 极简 DM，需要自己配 greeter

# ============================================================================
# 基础设置
# ============================================================================
# 是否让 Calamares 创建 DM 用户的 /var 目录等
# 建议 false，因为 DM 包在安装时已经处理好这些
basicSetup: false

# openSUSE 风格的 sysconfig 配置
# Arch 不需要，保持 false
sysconfigSetup: false

# ============================================================================
# 默认桌面环境（可选）
# ============================================================================
# 如果不设置，Calamares 会检测已安装的 DE。
# 如果设置，会强制使用指定的 DE。
#defaultDesktopEnvironment:
#    executable: "startplasma-wayland"  # 可执行文件路径
#    desktopFile: "plasma"              # .desktop 文件名

# ============================================================================
# DM 专属设置
# ============================================================================
greetd:
  # greetd 使用的 greeter 用户
  greeter_user: "greeter"
  greeter_group: "greetd"
  # GTK CSS 样式文件位置（gtkgreet 等支持）
  # greeter_css_location: "/etc/greetd/style.css"

lightdm:
  # 优先使用的 greeter（按顺序）
  preferred_greeters:
    - "lightdm-gtk-greeter.desktop"
    - "slick-greeter.desktop"

sddm:
  # SDDM 配置文件路径
  configuration_file: "/etc/sddm.conf"
