#
# ============================================================================
# 欢迎页模块 (welcome)
# ============================================================================
# 显示欢迎页面，包括产品信息和系统要求检查。
# 用户必须满足所有 "required" 的条件才能继续安装。
---
# 欢迎页按钮显示控制
# showSupportUrl:      显示"支持"按钮（链接来自 branding.desc）
# showKnownIssuesUrl:  显示"已知问题"按钮
# showReleaseNotesUrl: 显示"发行注记"按钮
showSupportUrl:         true
showKnownIssuesUrl:     true
showReleaseNotesUrl:    false

# ============================================================================
# 系统要求检查
# ============================================================================
requirements:
    # 最少存储空间（GiB，支持小数）
    # Arch 基础安装约需 2 GiB，但推荐留更多空间
    requiredStorage:    8.0

    # 最少内存（GiB）-- Arch 要求至少 512 MiB
    requiredRam:        1.0

    # 网络连接检测 URL（用于检查是否能上网）
    # 可以是单个 URL 或 URL 列表（任何一个能访问就算联网）
    # ⚠ 改成你自己的域名或中国镜像，避免隐私问题
    internetCheckUrl:
        - https://archlinux.org
        - https://www.baidu.com

    # 要检查的条件列表
    # 可用的检查项：
    #   storage  磁盘空间
    #   ram      内存
    #   power    电源（笔记本是否插电）
    #   internet 网络连接
    #   root     是否以 root 运行
    #   screen   屏幕分辨率（ >= 800x600 ）
    check:
        - storage
        - ram
        - power
        - internet
        - root
        - screen

    # 必须满足的条件（不满足则"下一步"按钮灰掉）
    # ⚠ 如果你想允许离线安装（预先下载好包），可以去掉 internet
    required:
        - storage
        - ram
        - root

# ============================================================================
# GeoIP 地理位置检测（用于预选语言）
# ============================================================================
# 根据用户的地理位置自动选择默认语言。
# style 设为 "none" 可禁用。
# 支持格式：json / xml / fixed（测试用，总是返回 selector 的值）
geoip:
    style:    "none"                                  # 禁用 GeoIP
    url:      "https://geoip.kde.org/v1/ubiquity"    # geoip 数据源
    selector: "CountryCode"                           # 从响应中选取国家代码
