#
# ============================================================================
# 机器 ID 模块 (machineid)
# ============================================================================
# 生成 /etc/machine-id 和 dbus 相关标识文件。
# machine-id 是 systemd 和 dbus 用于标识特定机器的唯一 ID。
# 每个安装都应该是唯一的，所以不能复制 live 系统的 ID。
#
# 如果使用 squashfs 部署，等于是每台机器都有相同的 ID，
# 这个模块负责为每台新安装的系统生成新的唯一 ID。
#
# 参考: https://www.freedesktop.org/software/systemd/man/machine-id.html
# ============================================================================
---
# ============================================================================
# systemd machine-id
# ============================================================================
# 是否创建 /etc/machine-id
systemd: true

# 生成的 ID 类型：
#   uuid  - 随机 UUID（推荐）
#   blank - 空文件（系统第一次启动时自动生成）
#   literal-uninitialized - 写入 "uninitialized\n"
systemd-style: uuid

# ============================================================================
# D-Bus machine-id
# ============================================================================
# 是否创建 /var/lib/dbus/machine-id
dbus: true

# 是否把 dbus machine-id 符号链接到 /etc/machine-id
# 推荐 true，避免两处不同步
dbus-symlink: true

# ============================================================================
# 熵池文件
# ============================================================================
# 随机数种子文件，系统重启后帮助快速恢复熵池
# 复制主机的种子（如果有的话），否则从 /dev/urandom 生成
entropy-copy: false
entropy-files:
    - /var/lib/systemd/random-seed
