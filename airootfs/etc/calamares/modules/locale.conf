# ============================================================================
# 区域设置模块 (locale)
# ============================================================================
# 让用户选择系统语言、数字格式和时区。
# 在 exec 阶段，此模块会写入语言配置到目标系统。
---
# 初始地图位置（默认时区）
region:                     "Asia"
zone:                       "Shanghai"

# 使用系统当前时区作为默认（覆盖上面的 region/zone）
# true: 用 live 系统的时区
# false: 用上面指定的 region/zone
#useSystemTimezone: true

# 在地图上点击改变时区时，是否立即更新 live 系统的时钟
#adjustLiveTimezone:   true

# 语言文件生成路径（绝大多数发行版用默认值 /etc/locale.gen）
#localeGenPath:             "/etc/locale.gen"

# ============================================================================
# GeoIP 时区检测
# ============================================================================
# 通过 IP 地址自动检测时区。设为 "none" 禁用。
# 支持的 style: json, xml, fixed
geoip:
    style:    "none"                              # 禁用 GeoIP
    url:      "https://geoip.kde.org/v1/calamares"  # 数据源 URL
    selector: ""                                   # JSON/XML 字段选择器
