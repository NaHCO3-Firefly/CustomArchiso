#
# ============================================================================
# 分区模块 (partition)
# ============================================================================
# Calamares 最核心的模块之一，负责磁盘分区操作。
# 提供三种分区模式：
#   1. 自动分区（擦除整个磁盘）
#   2. 替换分区（替换一个已有分区）
#   3. 手动分区（用户自由调整分区表）
#
# ⚠  ⚠  ⚠  这个模块会真实修改硬盘！测试请在虚拟机中进行  ⚠  ⚠  ⚠
#
# 参考: https://wiki.archlinux.org/title/Partitioning
# ============================================================================
---
# ============================================================================
# EFI 系统分区 (ESP) 设置
# ============================================================================
efi:
    # EFI 系统分区的挂载点
    # Arch 标准用法：直接挂到 /boot（GRUB 可以直接读到内核和 initramfs）
    # 其他发行版常用 /boot/efi
    # ⚠ 如果你用 systemd-boot，/boot 也要可写，所以挂 /boot
    mountPoint:         "/boot"

    # 推荐分区大小（支持 MiB、GiB、MB、GB）
    # FAT32 的单个文件最大 4GiB，所以 /boot 不需要太大
    # Arch 建议 256-512 MiB，这里取 512
    recommendedSize:    512MiB

    # 绝对最小分区大小（低于这个值不能继续）
    # UEFI 规范要求至少 32MiB
    minimumSize:        256MiB

    # 分区名（GPT 分区表时有效，显示为 PARTLABEL）
    label:              "EFI"

# ============================================================================
# 交换空间选择
# ============================================================================
# 让用户选择交换空间方案。可以给多个选项让用户选。
#
# 可用选项：
#   none    不创建交换空间（适用于内存大的机器）
#   small   小型交换（最多 8GiB，不超过磁盘 10%）
#   suspend 支持休眠（至少等于内存大小）
#   file    使用交换文件而非交换分区（现代推荐方式）
#
# Arch 官方推荐使用 swapfile 或 zram，而非交换分区。
userSwapChoices:
    - none
    - small
    - suspend
    - file      # <-- 推荐：交换文件，灵活且不占用分区

# 交换分区名（GPT PARTLABEL，可选）
# swapPartitionName:      swap

# ============================================================================
# 加密设置
# ============================================================================
# LUKS 版本选择
#   luks1: 兼容性好（GRUB 完美支持）
#   luks2: 安全性更新，但 GRUB 支持有限（需要 PBKDF2）
luksGeneration: luks1

# 是否允许 ZFS 加密
# 某些引导器（GRUB）不支持 ZFS 加密，所以默认关闭提示
# allowZfsEncryption: false

# ============================================================================
# 界面选项
# ============================================================================
# 正确绘制嵌套分区（如逻辑分区）
drawNestedPartitions:   false

# 在手动分区的表格中始终显示分区标签
alwaysShowPartitionLabels: true

# 是否允许手动分区（设为 false 则隐藏"手动分区"按钮）
#allowManualPartitioning:   true

# 分区选择页的初始选项（默认"none"让用户必须做选择，避免误操作）
# erase: 擦除整个磁盘  replace: 替换  alongside: 并存  manual: 手动
initialPartitioningChoice: none

# 交换选择的初始值
initialSwapChoice: none

# ============================================================================
# 文件系统设置
# ============================================================================
# 创建新分区时默认的文件系统类型
# 可选: ext4, ext3, ext2, btrfs, xfs, jfs, f2fs, reiser
defaultFileSystemType:  "ext4"

# 自动擦除时可让用户选择的文件系统列表
# 若不设置则只有 defaultFileSystemType
availableFileSystemTypes:  ["ext4", "btrfs", "xfs", "f2fs"]

# 默认分区表类型（gpt / msdos）
# 默认：EFI 时用 gpt，BIOS 时用 msdos
#defaultPartitionTableType: gpt

# 限制可安装的磁盘分区表类型
#requiredPartitionTableType: gpt

# 按挂载点限制文件系统类型
# ⚠ 确保 EFI 分区只能选 FAT32
directoryFilesystemRestrictions:
    - directory: "/"
      allowedFilesystemTypes: ["ext4", "btrfs", "xfs", "f2fs"]
    - directory: "/boot"
      allowedFilesystemTypes: ["fat32"]
      onlyWhenMountpoint: true

# ============================================================================
# 特殊挂载/设备排除
# ============================================================================
# 分区前需要保留的设备名（不会被卸载）
# live-*: live 系统的必要设备
# archiso, airootfs: Arch ISO 的 loop 设备
essentialMounts: [ "live-*", "control", "ventoy", "archiso", "airootfs" ]

# ============================================================================
# LUKS 加密和 LVM
# ============================================================================
# 是否在自动分区中显示 LUKS 加密选项
enableLuksAutomatedPartitioning:    true

# 是否在自动分区中预勾选加密复选框
#preCheckEncryption:    false

# LVM（逻辑卷管理）支持
lvm:
    enable: true    # true=显示 LVM 选项，false=隐藏

# ============================================================================
# 自动分区布局（可选）
# ============================================================================
# 定义自动分区时的分区方案。
# 如果不设置，默认是单个分区（100%空间）。
# EFI 系统分区和交换分区会自动添加到布局前后。
#
# 每个分区支持的属性：
#   name:       标签名
#   type:       GPT 分区类型 UUID（可选）
#   filesystem: 文件系统类型
#   mountPoint: 挂载点
#   size:       大小（支持百分比如 50%）
#   minSize:    最小值
#   maxSize:    最大值
#
# 示例 - 推荐的分区方案：
# partitionLayout:
#     - name: "root"
#       filesystem: "ext4"
#       mountPoint: "/"
#       size: 80%
#       minSize: 30G
#       maxSize: 80G
#     - name: "home"
#       filesystem: "ext4"
#       mountPoint: "/home"
#       size: 100%
#       minSize: 10G
