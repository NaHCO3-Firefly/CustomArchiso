#
# ============================================================================
# 挂载模块 (mount)
# ============================================================================
# 在 exec 阶段开始时挂载分区到目标系统。
# 从 partition 模块的全局存储中读取分区信息，然后挂载。
# 还负责挂载必要的虚拟文件系统（/proc、/sys、/dev、/run）。
#
# 如果使用 Btrfs，还要在此创建子卷。
# ============================================================================
---
# ============================================================================
# 额外挂载点
# ============================================================================
# 这些虚拟文件系统对 chroot 和包管理器是必要的。
# 它们在 chroot 中提供对内核、设备和进程的访问。
# ============================================================================
extraMounts:
    # 进程信息虚拟文件系统
    - device: proc
      fs: proc
      mountPoint: /proc
    # 内核/设备信息虚拟文件系统
    - device: sys
      fs: sysfs
      mountPoint: /sys
    # 设备节点
    - device: /dev
      mountPoint: /dev
      options: [ bind ]
    # 运行时数据目录
    - device: tmpfs
      fs: tmpfs
      mountPoint: /run
    # udev 设备管理器数据库（Arch 需要）
    - device: /run/udev
      mountPoint: /run/udev
      options: [ bind ]
    # UEFI 变量文件系统（仅在 UEFI 模式下挂载）
    - device: efivarfs
      fs: efivarfs
      mountPoint: /sys/firmware/efi/efivars
      efi: true

# ============================================================================
# Btrfs 子卷配置
# ============================================================================
# 如果根分区是 Btrfs，自动创建这些子卷。
# 子卷的好处：快照、独立挂载选项、配额管理。
# 如果不使用 Btrfs，这里会被忽略。
# ============================================================================
btrfsSubvolumes:
    - mountPoint: /
      subvolume: /@           # @ 子卷存根系统
    - mountPoint: /home
      subvolume: /@home       # @home 分离家目录，方便快照/回滚
    - mountPoint: /var/cache
      subvolume: /@cache      # @cache 包缓存，方便回滚时不丢失
    - mountPoint: /var/log
      subvolume: /@log        # @log 日志，方便排查问题

# Btrfs 上交换文件的存放子卷
btrfsSwapSubvol: /@swap

# ============================================================================
# 挂载选项（按文件系统类型）
# ============================================================================
# 为不同类型的文件系统设置不同的挂载选项。
# 支持 ssdOptions 和 hddOptions 单独设置。
# ============================================================================
mountOptions:
    - filesystem: default          # 所有其他文件系统的默认值
      options: [ defaults ]
    - filesystem: efi              # EFI 系统分区专用
      options: [ defaults, umask=0077 ]  # umask=0077 确保 ESP 不可执行
    - filesystem: btrfs            # Btrfs 专用
      options: [ defaults, compress=zstd:1 ]  # zstd 压缩，比 lzo 更好
    - filesystem: btrfs_swap       # Btrfs 上的交换文件子卷
      options: [ defaults, noatime ]
