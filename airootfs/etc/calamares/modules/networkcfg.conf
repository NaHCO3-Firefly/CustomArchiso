#
# ============================================================================
# 网络配置模块 (networkcfg)
# ============================================================================
# 此模块负责在目标系统中配置网络。
# 通常只是确保网络管理器（NetworkManager）服务已启用，
# 实际的网络配置由 services-systemd 模块处理。
# ============================================================================
---
# 保留 live 系统的网络配置文件（通常为空，不做额外操作）
preserveFiles:
    - ""

# 是否安装网络管理软件包
# 我们已经通过 packages 模块安装 NetworkManager，这里关掉
installPackages: false

# 是否启用网络服务
# 由 services-systemd 模块启用 NetworkManager.service
enableServices: false
