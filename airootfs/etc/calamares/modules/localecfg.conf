# ============================================================================
# 区域配置模块 (localecfg)
# ============================================================================
# 此模块在目标系统中写入区域相关的配置文件：
#   /etc/locale.gen     -- 可用的 locale 列表（需要 locale-gen 生成）
#   /etc/locale.conf    -- 系统的默认语言设置
#   /etc/vconsole.conf  -- 虚拟控制台的键盘布局和字体
#
# 这个模块根据 locale 和 keyboard 模块在 global storage 中
# 保存的用户选择来生成上述文件。
#
# 参考:
#   https://wiki.archlinux.org/title/Locale
#   https://wiki.archlinux.org/title/Linux_console#Keyboard_configuration
# ============================================================================
---
# 是否写入 locale 配置（/etc/locale.conf）
setLocale: true

# 是否写入虚拟控制台键盘配置（/etc/vconsole.conf）
setVConsole: true

# 总是启用的附加 locale（无论用户选什么，都会在 locale.gen 中取消注释）
# en_US.UTF-8 建议保留，兼容性更好
additionalLocales:
    - en_US.UTF-8 UTF-8
