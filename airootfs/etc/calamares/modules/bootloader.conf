#
# ============================================================================
# 引导加载器模块 (bootloader)
# ============================================================================
# 在目标系统上安装引导加载器（GRUB / systemd-boot / rEFInd）。
# 引导加载器负责在开机时加载操作系统。
#
# 参考:
#   https://wiki.archlinux.org/title/Arch_boot_process#Boot_loader
#   https://wiki.archlinux.org/title/GRUB
#   https://wiki.archlinux.org/title/Systemd-boot
# ============================================================================
---
# ============================================================================
# EFI 引导器选择
# ============================================================================
# 可选值: grub, systemd-boot, refind, sb-shim
#
# GRUB:        最通用，支持 BIOS+UEFI、双系统检测、LUKS2 解锁
# systemd-boot: 更简单，仅 UEFI，Arch 自带支持
# refind:      macOS 风格的主题引导器
efiBootLoader: "grub"

# 需要从全局存储读取引导器类型的变量名
# 用于 packagechooser 让用户选择引导器
#efiBootLoaderVar: "packagechooser_bootloader"

# ============================================================================
# systemd-boot 设置（如果用 systemd-boot 的话）
# ============================================================================
kernelSearchPath: "/usr/lib/modules"
kernelPattern: "^vmlinuz.*"
loaderEntries:
  - "timeout 5"
  - "console-mode keep"

# 通用的内核参数（GRUB 和 systemd-boot 都读取）
# "quiet" 减少开机输出信息
# "udev.log_level=3" 减少 udev 日志
kernelParams: [ "quiet", "udev.log_level=3" ]

# rEFInd 接受的内核名称列表
#refindKernelList: [ "linux","linux-lts","linux-zen","linux-hardened" ]

# ============================================================================
# GRUB 2 设置
# ============================================================================
# GRUB 命令名称（有些发行版叫 grub2-*）
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"

# EFI 引导器 ID（grub-install 的 --bootloader-id 参数）
# 这个值也用作 EFI 目录名（/boot/efi/EFI/<dirname>/）
# 如果不设置，默认使用 branding.desc 中的 bootloaderEntryName
# ⚠ 有些主板/UEFI 固件挑这个名称，gNew 可能用 "debian" 或 "ubuntu"
# efiBootloaderId: "Arch Linux"

# 是否安装 UEFI 回退引导路径（bootx64.efi）
# 某些主板（Intel DH87MC 等）需要
installEFIFallback: true

# 是否同时安装 BIOS 和 UEFI 版 GRUB（混合引导）
installHybridGRUB: false
