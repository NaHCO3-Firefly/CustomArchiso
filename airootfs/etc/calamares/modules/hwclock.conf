# ============================================================================
# 硬件时钟模块 (hwclock)
# ============================================================================
# 在目标系统中设置硬件时钟。
# Arch Linux 默认使用 UTC 时间标准。
# 硬件时钟（BIOS 时钟）应该设置为 UTC，
# 操作系统在启动时再将其转换为本地时间。
#
# 参考: https://wiki.archlinux.org/title/System_time#Time_standard
# ============================================================================
---
# 是否从系统时钟设置硬件时钟
setHWClock: true

# 时区（实际时区由 locale 模块选择，这里只是默认）
timezone: "UTC"
