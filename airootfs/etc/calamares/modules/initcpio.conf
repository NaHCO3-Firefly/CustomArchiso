#
# ============================================================================
# mkinitcpio 执行模块 (initcpio)
# ============================================================================
# 此模块实际运行 mkinitcpio 命令，生成 initramfs 镜像。
# 在上一步 initcpiocfg 配置好 /etc/mkinitcpio.conf 之后执行。
# 它还会处理 CPU 微码的 initramfs（intel-ucode.img / amd-ucode.img）。
#
# 参考: https://wiki.archlinux.org/title/Mkinitcpio
# ============================================================================
---
# ============================================================================
# 内核版本选择
# ============================================================================
# 要生成 initramfs 的内核预设名：
#   "linux"       - 只处理 linux 预设
#   "linux-lts"   - 只处理 linux-lts
#   "linux-zen"   - 只处理 linux-zen
#   "all" 或留空  - 处理所有预设（/etc/mkinitcpio.d/ 下所有.preset文件）
#
# 如果你安装了多个内核（linux + linux-lts），建议用 "all"
kernel: linux

# ============================================================================
# 安全设置
# ============================================================================
# 设为 true 则会关闭 initramfs 文件权限的修复（CVE-2019-13179 缓解措施）
# 如果 initramfs 存放在 EFI 分区（FAT32，不支持 POSIX 权限），此项无效
be_unsafe: false
