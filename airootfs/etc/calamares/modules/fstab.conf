# ============================================================================
# fstab 生成模块 (fstab)
# ============================================================================
# 生成 /etc/fstab 和 /etc/crypttab。
# fstab 定义了系统启动时自动挂载的文件系统。
# crypttab 定义了加密设备的解锁方式。
#
# 参考: https://wiki.archlinux.org/title/Fstab
# ============================================================================
---
# ============================================================================
# crypttab 选项
# ============================================================================
# 加密设备在 /etc/crypttab 中的默认选项
# 对于 LUKS 加密的根分区，grub 需要提前解锁
crypttabOptions: luks

# ============================================================================
# /tmp 挂载选项
# ============================================================================
# 根据磁盘类型（普通 HDD / SSD）配置不同的 /tmp 策略：
#   default: HDD 场景 - 不挂 tmpfs，用磁盘上的 /tmp
#   ssd:     SSD 场景 - 挂 tmpfs 到 /tmp（减少 SSD 写入）
#
# tmpfs 的好处：/tmp 数据在内存中，重启即清空，减少 SSD 磨损
tmpOptions:
    default:
        tmpfs: false
        options: ""
    ssd:
        tmpfs: true
        options: "defaults,noatime,mode=1777"
