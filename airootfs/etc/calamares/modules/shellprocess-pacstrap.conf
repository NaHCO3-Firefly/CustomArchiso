# SPDX-License-Identifier: CC0-1.0
#
# ============================================================================
# 在线安装：pacstrap 基础系统
# ============================================================================
# 通过 pacstrap 从 Arch 仓库在线安装基础系统。
# 仅安装 base + linux + linux-firmware，后续包由 packages 模块安装。
# fstab 由 fstab 模块生成，引导器由 bootloader 模块安装。
# ============================================================================
---
dontChroot: true
timeout: 600
verbose: true

script:
    # pacstrap -K 初始化密钥环并安装最小基础系统
    - command: "pacstrap -K ${ROOT} base linux linux-firmware"
      timeout: 600
      environment:
          - "LANG=C"

    # 写入国内镜像源（替换宿主机镜像源，仅保留国内源）
    - command: |
        printf "## China\n" > "${ROOT}/etc/pacman.d/mirrorlist"
        printf "Server = https://mirrors.ustc.edu.cn/archlinux/\044repo/os/\044arch\n" >> "${ROOT}/etc/pacman.d/mirrorlist"
        printf "Server = https://mirrors.tuna.tsinghua.edu.cn/archlinux/\044repo/os/\044arch\n" >> "${ROOT}/etc/pacman.d/mirrorlist"
        printf "Server = https://mirrors.aliyun.com/archlinux/\044repo/os/\044arch\n" >> "${ROOT}/etc/pacman.d/mirrorlist"
      timeout: 10

i18n:
    name: "正在安装基础系统（pacstrap）"
