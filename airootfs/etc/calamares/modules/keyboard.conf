# ============================================================================
# 键盘布局模块 (keyboard)
# ============================================================================
# 让用户选择键盘布局。
# 在 exec 阶段，此模块会把布局写入目标系统的配置文件中。
# ⚠ 需要 ckbcomp 包（用于布局预览），否则预览功能不可用
---
# X11 键盘配置文件路径（相对于 /etc/X11/xorg.conf.d/）
# 绝对路径以 / 开头，相对路径从 /etc/X11/xorg.conf.d/ 算起
xOrgConfFileName: "/etc/X11/xorg.conf.d/00-keyboard.conf"

# X11 到 kbd 格式的转换后的键盘映射文件路径
# Arch 中位于 /usr/share/kbd/keymaps/xkb
convertedKeymapPath: "/usr/share/kbd/keymaps/xkb"

# 写入 Debian 风格的 /etc/default/keyboard 文件
# Arch 不需要，设 false
#writeEtcDefaultKeyboard:   false

# 使用 locale1 DBus 服务（systemd 方式）配置键盘
# Wayland 环境建议 true，X11 默认 false
#useLocale1: true

# 从用户语言猜测默认键盘布局
# true: 选中文就预设中文键盘  false: 保持 live 系统的键盘布局
#guessLayout: true

# 额外配置项
configure:
    # 配置 KDE/KWin 的键盘（KDE Plasma 下需要）
    kwin: false
    # 配置 GNOME Wayland 的键盘（Ubuntu 24.10+）
    gnome: false
