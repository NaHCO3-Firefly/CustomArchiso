#
# ============================================================================
# 软件包管理模块 (packages)
# ============================================================================
# 在目标系统中安装/移除软件包。
#
# ⚠ 前提：目标系统已经有可用的包管理器（base 系统已通过 unpackfs 或
#   pacstrap 部署）。这个模块用来安装额外的包或清理不需要的包。
#
# 参考: https://wiki.archlinux.org/title/Pacman
# ============================================================================
---
# ============================================================================
# 后端选择
# ============================================================================
# 可选后端：
#   pacman  - Arch Linux 包管理器
#   apt     - Debian/Ubuntu
#   dnf     - Fedora/RHEL
#   zypp    - openSUSE
#   portage - Gentoo
#   dummy   - 测试用（只记录日志，不实际安装）
backend: pacman

# ============================================================================
# 联网策略
# ============================================================================

# 没网时跳过此模块（适合离线安装场景）
skip_if_no_internet: false

# 安装前更新包数据库（相当于 pacman -Sy）
# 如果目标系统是通过 squashfs 部署的，可能需要更新数据库
update_db: true

# 安装前更新整个系统（相当于 pacman -Syu）
# 从 squashfs 部署的系统可能落后于仓库，需要更新
update_system: false

# ============================================================================
# pacman 特定选项
# ============================================================================
pacman:
    # 安装失败时的重试次数
    num_retries: 3

    # 禁用下载超时（适合大包或慢速网络）
    disable_download_timeout: false

    # 使用 --needed 参数（跳过已安装的最新包）
    needed_only: false

# ============================================================================
# 软件包操作列表
# ============================================================================
# operations: 一系列操作（按顺序执行），每个操作可以是 install/remove。
#
# 支持 ${LOCALE} 自动替换为语言代码（如 zh_CN 选中文时会换成 zh）。
#
# 包名格式：
#   - 简单名称: "package"
#   - 含前后脚本:
#       package: "package"
#         pre-script: "..."     # 安装前执行的命令
#         post-script: "..."    # 安装后执行的命令
#
# 注意：带脚本的包无法批量安装（一次只能装一个），效率较低。
# 尽量把无特殊脚本的包放在一起以加快速度。
# ============================================================================
operations:
  # ---- [安装] 基础系统包 ----
  # ⚠ 如果你通过 pacstrap（shellprocess-pacstrap）安装了 base，
  #    这里的包可以缩减到"额外"或桌面环境包。
  #    如果你通过 unpackfs 部署 squashfs，这里列出需要额外安装的包。
  - install:
    - base-devel        # 编译工具链（gcc, make 等）
    # base、linux、linux-firmware 已由 pacstrap 安装，此处不重复
    # CPU 微码更新（二选一或全选，grub-mkconfig 会自动处理）
    - intel-ucode       # Intel CPU 微码更新
    - amd-ucode         # AMD CPU 微码更新
    # 引导器
    - grub              # GRUB 引导器
    - efibootmgr        # UEFI 引导管理器（创建 NVRAM 条目）
    - os-prober         # 检测其他操作系统（GRUB 双系统引导需要）
    # 网络
    - networkmanager    # NetworkManager 网络管理器
    # 基础工具
    - sudo              # sudo 提权
    - nano              # 简单文本编辑器
    - vim               # 高级文本编辑器
    - man-db            # man 手册页数据库
    - man-pages         # man 手册页内容
    - texinfo           # info 格式文档
    - openssh           # SSH 服务器和客户端
    - bash-completion   # bash 自动补全增强
    # 桌面环境（KDE Plasma）
    - sddm              # 显示管理器（登录界面）
    - plasma-meta       # KDE Plasma 桌面环境（元包）
    - konsole           # 终端模拟器
    - dolphin           # 文件管理器
    # 应用
    - firefox           # Web 浏览器
    - firefox-i18n      # Firefox 语言包（如需要特定语言用 firefox-i18n-zh-cn）
    # 输入法（Fcitx5）
    - fcitx5-im         # Fcitx5 输入法框架（含 fcitx5-configtool 等）
    - fcitx5-chinese-addons  # 中文输入引擎（拼音、双拼、五笔等）

  # ---- [移除] 不需要的软件包 ----
  # 如果从 squashfs 部署，你可能想移除仅 live 环境需要的包
  #- remove:
  #  - calamares          # 安装完成后移除 calamares 本身
  #  - arch-install-scripts  # 安装脚本（安装完成后不再需要）
