#
# ============================================================================
# 解包模块 (unpackfs)
# ============================================================================
# 将基础文件系统从 squashfs 镜像解压到目标磁盘。
# 这是大多数 Arch 系发行版（Manjaro、EndeavourOS、CachyOS）采用的方式：
# 预先用 pacstrap 打好一个最小化系统，压缩成 .sfs 文件，
# 安装时直接解压，速度快且不需要联网。
#
# ============================================================================
# 如何制作 Arch 的 base squashfs 镜像？
# ============================================================================
# 1. 创建根文件系统目录：
#    # mkdir -p /tmp/rootfs
#
# 2. 安装基础包：
#    # pacstrap /tmp/rootfs base
#
# 3. 清除不需要的内容缩小体积：
#    # rm -rf /tmp/rootfs/var/cache/pacman/pkg/*
#
# 4. 压缩成 squashfs：
#    # mksquashfs /tmp/rootfs /path/to/airootfs.sqfs \
#        -comp xz -b 1M -noappend
#
# 5. （可选）把该文件放到安装媒介上
#
# ============================================================================
# 或者用 Arch ISO 自带的 airootfs.sfs（在 live 环境中）：
#   /run/archiso/bootmnt/arch/x86_64/airootfs.sfs
#   注意这是 live 系统的 rootfs，可能包含不必要的包
# ============================================================================
---
unpack:
    # source:   源文件路径（相对于 live 系统的绝对路径）
    # sourcefs: 源文件系统类型（squashfs、ext4、file）
    # destination: 目标路径（相对于目标系统根目录，"" 表示 /）
    #
    # 默认指向 Arch ISO 的 squashfs（在 live ISO 环境中有效）
    # ⚠ 如果是自定义的 ISO，请改为此 ISO 中 squashfs 的实际路径
    #
    -   source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
        sourcefs: "squashfs"
        destination: ""

    # 可以同时解包多个镜像（按顺序）
    # 例如：基础系统 + 额外驱动 + 桌面环境
    # - source: "/path/to/desktop.sqfs"
    #   sourcefs: "squashfs"
    #   destination: ""
    #   optional: true     # 可选：文件不存在不报错
