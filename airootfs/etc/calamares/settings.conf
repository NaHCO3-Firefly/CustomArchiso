# ============================================================================
# Calamares 主配置文件
# ============================================================================
# 这是 Calamares 安装程序的顶层配置文件。
# 它定义了安装过程中使用的模块、执行顺序、以及全局行为。
#
# 配置的查找路径（由 modules-search 控制）：
#   /usr/lib/calamares/modules/    -- 模块的 .so 文件（不可修改）
#   /usr/share/calamares/modules/  -- 模块的默认 *.conf（会被 /etc 覆盖）
#   /etc/calamares/modules/        -- 模块的自定义 *.conf（优先级最高）
#
# 更多资料：
#   Calamares Wiki: https://github.com/calamares/calamares/wiki
#   Arch Wiki:      https://wiki.archlinux.org/title/Installation_guide
---
# ---------------------------------------------------------------------------
# 模块搜索路径
# "local" 表示使用系统标准路径（/usr/lib 存 .so，/etc 或 /usr/share 存 .conf）
# 也可以直接写绝对路径指向自定义模块目录
# ---------------------------------------------------------------------------
modules-search: [ local ]

# ---------------------------------------------------------------------------
# 多实例配置（可选）
# 如果你需要同一个模块运行多次（比如 shellprocess 执行多个不同脚本），
# 就在这里定义实例。每个实例有独立的 id 和 config 文件。
#
# 实例 key = module@id，在 sequence 中用 "module@id" 引用。
# ---------------------------------------------------------------------------
instances:
  - id:       pacstrap          # 实例标识符
    module:   shellprocess      # 模块名
    config:   shellprocess-pacstrap.conf   # 此实例专用的配置文件
    weight:   10                # 进度条权重（耗时长的模块给大权重）

  - id:       postinstall
    module:   shellprocess
    config:   shellprocess-postinstall.conf

# ============================================================================
# 安装流程顺序
# ============================================================================
# sequence 定义了安装过程中各模块的执行顺序。
#
# 两种阶段：
#   show 阶段：显示页面（欢迎页、语言页、分区页、用户页、摘要页等）
#             这些是 view module，提供用户交互界面
#   exec 阶段：执行实际安装（分区、挂载、安装软件包、配置系统等）
#             这些是 job module，在后台执行具体操作
#
# 重要规则：
#   - show 阶段的模块收集用户输入，存入全局存储（global storage）
#   - exec 阶段的模块从全局存储读取数据，执行实际安装操作
#   - exec 阶段的模块按顺序执行，前一个完成才开始下一个
# ---------------------------------------------------------------------------
sequence:
# ---- 第一步：用户交互页面 ----
- show:
  - welcome         # 欢迎页（显示发行版信息、检查系统要求）
  - locale          # 区域设置（语言、时区）
  - keyboard        # 键盘布局选择
  - partition       # 磁盘分区（自动分区 / 手动分区 / 替换 / 并存）
  - users           # 用户设置（用户名、密码、主机名）
  - summary         # 安装摘要（确认所有选择的最后机会）

# ---- 第二步：实际安装执行 ----
- exec:
  - partition       # 执行分区操作（格式化、创建分区）
  - mount           # 挂载分区到目标系统
  #- unpackfs        # 解压基础文件系统镜像（squashfs -> 目标磁盘）
  - shellprocess@pacstrap   # 在线安装：pacstrap 仅安装 base + linux + linux-firmware
  - fstab            # 生成 /etc/fstab
  - machineid       # 生成 /etc/machine-id（systemd/dbus 需要）
  - packages        # 安装 grub、efibootmgr、networkmanager、微码等附加包
  - locale          # 写入语言配置
  - keyboard        # 写入键盘布局
  - localecfg       # 生成 /etc/locale.conf 和 /etc/vconsole.conf
  - initcpiocfg     # 配置 /etc/mkinitcpio.conf（内核钩子）
  - initcpio        # 运行 mkinitcpio 生成 initramfs（微码已就绪）
  - users           # 创建用户、设置密码
  - displaymanager  # 配置显示管理器（SDDM/LightDM/GDM）
  - networkcfg      # 配置网络
  - hwclock         # 设置硬件时钟（UTC）
  - services-systemd  # 启用/禁用 systemd 服务
  - bootloader      # 安装 GRUB 引导器
  - umount          # 卸载分区（清理，最后一步）

# ---- 第三步：完成页面 ----
- show:
  - finished        # 显示安装完成页面，提示重启

# ---------------------------------------------------------------------------
# 品牌标识
# 指向 branding/ 目录下的品牌文件夹名（不是完整路径）
# 例如 "arch" 表示从 branding/arch/ 读取 branding.desc 和资源文件
# ---------------------------------------------------------------------------
branding: arch

# ---------------------------------------------------------------------------
# 全局行为设置
# ---------------------------------------------------------------------------

# 在执行安装前弹出 "你确定吗？" 确认对话框
# true: 显示确认提示  false: 不显示（但日志会有警告）
prompt-install: false

# 不在 chroot 环境中执行命令（仅用于安装后配置工具，正常安装设为 false）
# true: 在当前系统执行  false: 在目标系统的 chroot 中执行
dont-chroot: false

# OEM 安装模式（预装系统配置模式）
# true: Calamares 自称 "setup program" 而非 "installer"
oem-setup: false

# 完全禁用取消按钮（用户必须完成所有步骤）
disable-cancel: false

# 安装开始后禁用取消按钮（安装中途不可取消）
disable-cancel-during-exec: false

# 安装开始后隐藏"上一步"和"下一步"按钮
hide-back-and-next-during-exec: false

# 安装完成后自动退出（不显示完成页面）
# true: 自动关闭  false: 显示完成页，等待用户点确认
quit-at-end: false
